    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">

        <div class="container">

            <a class="navbar-brand" href="index.html">

                <img src="imagenes/img/logo.png" width="45">

                CocoBrew

            </a>

            <div class="ms-auto">

                <a href="index.html" class="nav-link d-inline text-white">Inicio</a>

                <a href="noticias.html" class="nav-link d-inline text-white">Noticias</a>

                <a href="enlaces.html" class="nav-link d-inline text-white">Enlaces</a>

                <a href="politicas.html" class="nav-link d-inline text-white">Políticas</a>

            </div>

        </div>
        
        <button id="modoOscuro" class="btn btn-warning ms-lg-3">
            <i class="bi bi-moon-fill"></i>
        </button>
    </nav>

    <section class="container py-5">

        <h1 class="text-center mb-5">

            Contáctanos

        </h1>

        <div class="row">

            <div class="col-lg-6">

                <h3>

                    Información

                </h3>

                <p>

                    ¿Tienes alguna pregunta o deseas conocer más sobre nuestras bebidas?

                    Completa el formulario o escríbenos directamente.

                </p>

                <p>

                    <i class="bi bi-geo-alt-fill"></i>

                    Santo Domingo, República Dominicana

                </p>

                <p>

                    <i class="bi bi-envelope-fill"></i>

                    info@cocobrew.com

                </p>

                <p>

                    <i class="bi bi-telephone-fill"></i>

                    (809) 714-1781

                </p>

                <a href="mailto:info@cocobrew.com" class="btn btn-success">

                    <i class="bi bi-envelope-paper-fill"></i>

                    Enviar un correo

                </a>

            </div>

            <div class="col-lg-6">

                <form id="formularioContacto">

                    <div class="mb-3">

                        <label>Nombre</label>

                        <input type="text" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label>Correo</label>

                        <input type="email" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label>Mensaje</label>

                        <textarea class="form-control" rows="5" required>

</textarea>

                    </div>

                    <button class="btn btn-success w-100">

                        Enviar

                    </button>

                </form>

            </div>

        </div>

    </section>

    <footer class="text-center text-white p-4">

        <p>

            Síguenos

        </p>

        <i class="bi bi-facebook fs-3 me-3"></i>

        <i class="bi bi-instagram fs-3 me-3"></i>

        <i class="bi bi-tiktok fs-3"></i>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/script.js"></script>
